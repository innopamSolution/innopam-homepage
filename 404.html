<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages + HashRouter: /innopam-homepage/products → /innopam-homepage/#/products
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/'); // '/innopam-homepage'
    var path = l.pathname.slice(base.length) || '/';        // '/products'
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/#' + path +
      (l.search || '')
    );
  </script>
</head>
<body></body>
</html>
