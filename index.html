<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/innopam-homepage/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innopam — AI &amp; Mapping Platform</title>
    <!-- Google Fonts: Space Grotesk, Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Pretendard CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <!-- Kakao Maps SDK (autoload=false: React component calls kakao.maps.load()) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=0ba52bd34c4b5acf99b451a8123e3dd7&autoload=false"></script>
    <script>
      // Restore path from 404.html redirect query param
      (function() {
        var redirect = window.location.search.slice(1);
        if (redirect) {
          var params = redirect.split('&');
          var p = params.find(function(s) { return s.startsWith('p=/'); });
          if (p) {
            var path = p.slice(2).replace(/~and~/g, '&');
            var query = params.find(function(s) { return s.startsWith('q='); });
            var search = query ? '?' + query.slice(2).replace(/~and~/g, '&') : '';
            window.history.replaceState(null, null,
              window.location.pathname.replace(/\/$/, '') + path + search + window.location.hash
            );
          }
        }
      })();
    </script>
    <script type="module" crossorigin src="/innopam-homepage/assets/index-B1zevbZz.js"></script>
    <link rel="stylesheet" crossorigin href="/innopam-homepage/assets/index-BbwKrjod.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
